<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cup Haven</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#f5f5f5;
}

/* Header */
header{
    background:#6b3e26;
    color:white;
    padding:20px;
}

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

nav ul{
    list-style:none;
    display:flex;
    gap:20px;
}

nav a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

/* Hero Section */
.hero{
    height:60vh;
    background:linear-gradient(rgba(0,0,0,0.4),rgba(0,0,0,0.4)),
    url("https://images.unsplash.com/photo-1509042239860-f550ce710b93");
    background-size:cover;
    background-position:center;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    text-align:center;
}

.hero h1{
    font-size:50px;
}

/* Products */
.products{
    padding:50px;
    text-align:center;
}

.product-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:30px;
    margin-top:30px;
}

.card{
    background:white;
    border-radius:10px;
    padding:20px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card img{
    width:100%;
    border-radius:10px;
}

.card h3{
    margin:10px 0;
}

/* Footer */
footer{
    background:#333;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:40px;
}

</style>
</head>

<body>

<header>
<nav>
<h2>Cup Haven ☕</h2>

<ul>
<li><a href="#">Home</a></li>
<li><a href="#">Cups</a></li>
<li><a href="#">About</a></li>
<li><a href="#">Contact</a></li>
</ul>

</nav>
</header>

<section class="hero">
<div>
<h1>Perfect Cups for Coffee Lovers</h1>
<p>Find your favorite mug today</p>
</div>
</section>

<section class="products">

<h2>Our Cups</h2>

<div class="product-grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1511920170033-f8396924c348">
<h3>Classic Mug</h3>
<p>$10</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1523906834658-6e24ef2386f9">
<h3>Ceramic Cup</h3>
<p>$12</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1498804103079-a6351b050096">
<h3>Travel Mug</h3>
<p>$15</p>
</div>

</div>

</section>

<footer>
<p>© 2026 Cup Haven | All Rights Reserved</p>
</footer>

</body>
</html>
